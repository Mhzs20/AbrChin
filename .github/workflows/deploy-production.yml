name: Deploy AbrChin production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: abrchin-production
  cancel-in-progress: false

env:
  IMAGE_NAME: ghcr.io/mhzs20/abrchin
  NEXT_TELEMETRY_DISABLED: "1"

jobs:
  verify-and-publish:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    outputs:
      image: ${{ steps.image.outputs.value }}
    steps:
      - name: Check out main
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify source
        run: |
          npm ci --no-audit --no-fund
          npm run lint
          npm run build
          npm run test:smoke

      - name: Set immutable image name
        id: image
        run: echo "value=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Sign in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true

  deploy:
    needs: verify-and-publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: production
      url: https://abrchin.ir
    env:
      PROD_SSH_HOST: ${{ secrets.PROD_SSH_HOST }}
      PROD_SSH_PORT: ${{ secrets.PROD_SSH_PORT }}
      PROD_SSH_USER: ${{ secrets.PROD_SSH_USER }}
      PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
      PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GHCR_USER: ${{ github.actor }}
      DEPLOY_IMAGE: ${{ needs.verify-and-publish.outputs.image }}
    steps:
      - name: Configure SSH
        shell: bash
        run: |
          set -Eeuo pipefail
          : "${PROD_SSH_HOST:?Missing PROD_SSH_HOST}"
          : "${PROD_SSH_USER:?Missing PROD_SSH_USER}"
          : "${PROD_SSH_PRIVATE_KEY:?Missing PROD_SSH_PRIVATE_KEY}"
          : "${PROD_SSH_KNOWN_HOSTS:?Missing PROD_SSH_KNOWN_HOSTS}"
          PROD_SSH_PORT="${PROD_SSH_PORT:-22}"
          echo "PROD_SSH_PORT=$PROD_SSH_PORT" >> "$GITHUB_ENV"
          install -m 700 -d "$HOME/.ssh"
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > "$HOME/.ssh/abrchin_deploy"
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/abrchin_deploy" "$HOME/.ssh/known_hosts"
          ssh -i "$HOME/.ssh/abrchin_deploy" -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" true

      - name: Sign the server in to GHCR
        shell: bash
        run: |
          set -Eeuo pipefail
          printf '%s' "$GHCR_TOKEN" | ssh -i "$HOME/.ssh/abrchin_deploy" \
            -p "$PROD_SSH_PORT" "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "docker login ghcr.io -u '$GHCR_USER' --password-stdin"

      - name: Deploy exact commit
        shell: bash
        run: |
          set -Eeuo pipefail
          ssh -i "$HOME/.ssh/abrchin_deploy" -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "cd /opt/abrchin && git fetch --prune origin main && git checkout --detach '$GITHUB_SHA' && ABRCHIN_IMAGE='$DEPLOY_IMAGE' ./ops/deploy.sh"

      - name: Sign the server out of GHCR
        if: always()
        shell: bash
        run: |
          ssh -i "$HOME/.ssh/abrchin_deploy" -p "$PROD_SSH_PORT" \
            "$PROD_SSH_USER@$PROD_SSH_HOST" \
            "docker logout ghcr.io >/dev/null 2>&1 || true"

      - name: Check the public URL
        if: ${{ vars.PROD_HEALTHCHECK_URL != '' }}
        env:
          PROD_HEALTHCHECK_URL: ${{ vars.PROD_HEALTHCHECK_URL }}
        run: curl --fail --show-error --silent --retry 10 --retry-all-errors "$PROD_HEALTHCHECK_URL"
